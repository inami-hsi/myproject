version: "1.0.0"
generated_at: "2026-02-28T10:00:00Z"
source: "docs/requirements/insurance-design-system.md"
project: "insurance"

# ========================================
# デザイン美学セクション
# ========================================
aesthetic:
  direction: trust-simplicity        # 信頼感 × シンプルさ
  mood: professional-friendly        # プロフェッショナル × 親しみやすさ
  philosophy: "複雑な保険選びをシンプルに"
  tagline: "段階的な訴求 → わかりやすい結果"
  target_personas:
    - name: "オンライン自動加入派"
      age_range: "25-40"
      primary_device: "smartphone"
      priority: ["speed", "simplicity"]
    - name: "対面相談志向派"
      age_range: "40-60"
      primary_device: "pc"
      priority: ["detail", "trust"]
    - name: "比較検討派"
      age_range: "30-50"
      primary_device: "pc"
      priority: ["comparison", "persuasion"]

# ========================================
# カラーシステム
# ========================================
colors:
  # プライマリー
  primary: "#0066CC"               # メインブルー（信頼・安心）
  primary_light: "#E1F0FF"         # セカンダリーブルー（淡い）
  primary_dark: "#0052A3"          # プライマリーダーク（ホバー）
  
  # セマンティックカラー
  success: "#27AE60"               # 推奨グリーン（1位表示）
  warning: "#F39C12"               # アラートオレンジ（注意・期限切れ）
  error: "#E74C3C"                 # エラーレッド
  info: "#0066CC"                  # 情報ブルー（プライマリーと同じ）
  
  # ニュートラルカラー
  text_primary: "#333333"          # 濃いグレー（テキスト）
  text_secondary: "#666666"        # 中グレー（補足テキスト）
  border: "#DDDDDD"                # 薄いグレー（区切り・枠線）
  
  # 背景
  background:
    light: "#FFFFFF"               # 白（カード背景）
    neutral: "#FAFAFA"             # ベージュ色が混じった薄いグレー
    dark: "#F0F0F0"                # 濃いめのグレー背景
  
  # 推奨バッジ（ランキング表示用）
  badge_1st: "#27AE60"             # 1位：グリーン
  badge_2nd: "#0066CC"             # 2位：ブルー
  badge_3rd: "#F39C12"             # 3位：オレンジ

# ========================================
# タイポグラフィシステム
# ========================================
typography:
  heading:
    family: "Noto Sans JP"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    weights: [600, 700]
    sizes:
      h1: "32px"                   # ページタイトル（PC）
      h1_mobile: "24px"            # ページタイトル（モバイル）
      h2: "24px"                   # セクション見出し（PC）
      h2_mobile: "18px"            # セクション見出し（モバイル）
      h3: "20px"                   # サブ見出し（PC）
      h3_mobile: "16px"            # サブ見出し（モバイル）
    line_heights:
      h1: "1.2"
      h2: "1.3"
      h3: "1.4"

  body:
    family: "Noto Sans JP"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    weights: [400, 500]
    sizes:
      regular: "16px"              # 本文（PC）
      regular_mobile: "14px"       # 本文（モバイル）
      large: "18px"
      small: "14px"
      caption: "12px"              # 補足テキスト
    line_heights:
      regular: "1.6"
      large: "1.5"
      small: "1.5"
      caption: "1.4"

  numeric:
    family: "Roboto Mono"          # 数値用（保険料）
    fallback: "monospace"
    weights: [600]
    sizes:
      price: "18px"                # 保険料表示
      amount: "16px"

# ========================================
# スペーシングシステム
# ========================================
spacing:
  unit: "8px"
  scale:
    xs: "4px"                      # 最小：アイコン間
    sm: "8px"                      # ボタン内パディング最小値
    md: "16px"                     # セクション内部スペース
    lg: "24px"                     # 中くらいセクション間隔
    xl: "32px"                     # 大きなセクション間隔
    2xl: "48px"                    # ページセクション最大間隔

# ========================================
# ボーダー・角丸システム
# ========================================
borders:
  radius:
    none: "0"
    sm: "4px"
    md: "8px"                      # デフォルト（ボタン・カード）
    lg: "12px"
    xl: "16px"
    full: "9999px"                 # ピル型（バッジ）
  
  width:
    thin: "1px"                    # デフォルト（カード枠）
    medium: "2px"                  # ボタンボーダー
    thick: "4px"

# ========================================
# シャドウシステム
# ========================================
shadows:
  none: "none"
  sm: "0 1px 4px rgba(0, 0, 0, 0.05)"     # カード軽い影
  md: "0 2px 8px rgba(0, 0, 0, 0.1)"      # ボタンホバー
  lg: "0 4px 16px rgba(0, 0, 0, 0.15)"    # モーダル
  xl: "0 8px 24px rgba(0, 0, 0, 0.2)"

# ========================================
# コンポーネントライブラリ設定
# ========================================
components:
  library: "shadcn/ui"             # UIコンポーネントベース
  styling: "tailwind"               # Tailwind CSS
  animation: "motion/react"         # アニメーション
  icons: "lucide-react"             # アイコン

# ========================================
# レスポンシブ設定
# ========================================
responsive:
  mobile_first: true
  breakpoints:
    sm: "375px"                    # スマートフォン（最小値）
    md: "768px"                    # タブレット
    lg: "1024px"                   # デスクトップ
    xl: "1280px"                   # デスクトップ大
  
  grid:
    sm:
      columns: 1
      margin: "16px"
      gutter: "16px"
      content_width: "343px"
    md:
      columns: 2
      margin: "24px"
      gutter: "24px"
      content_width: "720px"
    lg:
      columns: 3
      margin: "32px"
      gutter: "32px"
      content_width: "960px"

# ========================================
# ボタンコンポーネント仕様
# ========================================
buttons:
  primary:
    background: "#0066CC"
    text: "#FFFFFF"
    padding: "12px 24px"
    radius: "8px"
    height: "44px"                 # モバイルタップ最小値
    hover:
      background: "#0052A3"
      shadow: "0 2px 8px rgba(0, 0, 0, 0.1)"
    disabled:
      background: "#CCCCCC"
      text: "#999999"
      cursor: "not-allowed"

  secondary:
    background: "transparent"
    border: "2px solid #0066CC"
    text: "#0066CC"
    padding: "12px 24px"
    radius: "8px"
    height: "44px"
    hover:
      background: "#E1F0FF"

  success:
    background: "#27AE60"
    text: "#FFFFFF"
    padding: "12px 24px"
    radius: "8px"
    height: "44px"
    usage: ["相談する", "申し込む"]

  text:
    background: "transparent"
    text: "#0066CC"
    decoration: "underline"
    usage: ["詳細を見る", "スキップ", "戻る"]

# ========================================
# カード・コンテナ仕様
# ========================================
cards:
  background: "#FFFFFF"
  border: "1px solid #DDDDDD"
  shadow: "0 1px 4px rgba(0, 0, 0, 0.05)"
  padding:
    mobile: "16px"
    desktop: "24px"
  radius: "8px"
  margin_bottom: "16px"

# ========================================
# バッジ・ラベル仕様
# ========================================
badges:
  recommended:
    background: "#27AE60"
    text: "#FFFFFF"
    label: "★推奨"
    padding: "4px 12px"
    radius: "16px"
    font_size: "12px"
  
  ranking:
    1st:
      background: "#27AE60"
      label: "1位"
    2nd:
      background: "#0066CC"
      label: "2位"
    3rd:
      background: "#F39C12"
      label: "3位"
    size: "32px"
    shape: "circle"

# ========================================
# 入力フォーム仕様
# ========================================
forms:
  radio:
    size: "24px"
    checked_color: "#0066CC"
    label_font_size: "14px"
  
  checkbox:
    size: "24px"
    checked_background: "#0066CC"
    max_visible: 3

  slider:
    width: "100%"
    height: "6px"
    handle_size: "24px"
    color: "#0066CC"

# ========================================
# デザイン原則
# ========================================
principles:
  - name: "モバイルファースト"
    description: "モバイルから設計、PC対応へ拡張"
  
  - name: "段階的フロー"
    description: "1ページ1アクションで集中力を維持"
  
  - name: "視覚的優先度"
    description: "推奨1位は目立つ、2-3位は淡い"
  
  - name: "根拠の透明性"
    description: "「なぜこの会社か」を必ず記載（ロ方式準拠）"
  
  - name: "心理的安心"
    description: "保険業法準拠、ロ方式明示"

# ========================================
# パフォーマンス目標
# ========================================
quality:
  lighthouse:
    performance: 90
    accessibility: 100
    best_practices: 100
    seo: 100
  
  core_web_vitals:
    lcp: "2.5s"                    # Largest Contentful Paint
    fcp: "1.8s"                    # First Contentful Paint
    cls: "0.1"                     # Cumulative Layout Shift
  
  wcag_level: "AA"
  dark_mode: false                 # 保険商品では通常モードのみ
  supported_browsers:
    - "Chrome (latest)"
    - "Safari (latest)"
    - "Firefox (latest)"
    - "Edge (latest)"

# ========================================
# アニメーション設定
# ========================================
animation:
  motion_library: "motion/react"
  timing:
    fast: "200ms"                  # インタラクション（200ms以下）
    normal: "300ms"
    slow: "500ms"
  
  easing:
    ease_in_out: "ease-in-out"
    ease_out: "ease-out"
  
  allowed_properties:
    - "transform"                  # ✓ Compositor properties
    - "opacity"                    # ✓ Compositor properties
  
  disabled_properties:
    - "height"                     # ✗ Layout パラダイム（jank原因）
    - "width"                      # ✗ Layout property
    - "top"                        # ✗ Layout property
    - "left"                       # ✗ Layout property

# ========================================
# 関連ドキュメント参照情報
# ========================================
references:
  requirements: "docs/requirements/insurance-recommendation-requirements.md"
  design_detailed: "docs/requirements/insurance-design-system.md"
  ui_guidelines: "docs/design/insurance-ui-guidelines.md"
  component_specs: "docs/design/component-specs-insurance/"
  responsive_guide: "docs/design/insurance-responsive-guidelines.md"

