# Company List Builder - Design System
# Generated by CodeGenAgent (Gen)
# Source: docs/requirements/company-list-builder-design-requirements.md

version: "1.0.0"
generated_at: "2026-03-05T00:00:00Z"
source: "docs/requirements/company-list-builder-design-requirements.md"

# ==============================================================================
# 1. 美的方向性
# ==============================================================================
aesthetic:
  direction: brutally-minimal
  mood: professional-industrial
  differentiation: >
    検索条件を選ぶだけ。3クリックでリスト完成。
    業種ツリーと地域マップの直感的なフィルタUIで、
    専門知識がなくても誰でも企業リストを作れる体験。
    検索結果の件数がリアルタイムに変化するライブカウンターで
    絞り込みの過程を可視化する。
  references:
    - name: "BIZMAPS"
      url: "https://biz-maps.com"
      point: "企業検索UIの標準パターン"
    - name: "Crunchbase"
      url: "https://www.crunchbase.com"
      point: "データテーブルの情報密度と操作性"
    - name: "gBizINFO"
      url: "https://info.gbiz.go.jp"
      point: "政府データの検索UI・地域フィルタ"
    - name: "Airtable"
      url: "https://airtable.com"
      point: "テーブルビューのUX"

# ==============================================================================
# 2. カラーパレット（13色）
# ==============================================================================
colors:
  primary: "#0a0a0a"          # ほぼ純黒（テキスト・ヘッダー）
  secondary: "#404040"        # ダークグレー（サブテキスト）
  accent: "#2563eb"           # ブルー（CTA・アクティブ状態・リンク）
  accent_success: "#059669"   # エメラルドグリーン（成功・ダウンロード完了）
  background:
    main: "#ffffff"           # ホワイト
    surface: "#f8fafc"        # 極薄グレー（テーブル交互色・カード）
    filter: "#f1f5f9"         # サイドバー・フィルタエリア
  border: "#e2e8f0"           # テーブル罫線・セパレータ
  text:
    primary: "#0a0a0a"        # 本文テキスト
    secondary: "#64748b"      # 補足テキスト
  success: "#059669"          # ダウンロード完了・データ更新
  error: "#dc2626"            # エラー・制限超過
  warning: "#d97706"          # ダウンロード上限接近

# ==============================================================================
# 3. タイポグラフィ
# ==============================================================================
typography:
  heading:
    family_en: "Outfit"
    family_ja: "Noto Sans JP"
    fallback: "system-ui, sans-serif"
    weights: [500, 600, 700]
    sizes:
      h1: "2.25rem"           # 36px
      h2: "1.5rem"            # 24px
      h3: "1.25rem"           # 20px
      h4: "1.125rem"          # 18px
    line_height: 1.3
    letter_spacing: "-0.02em"
  body:
    family_en: "Outfit"
    family_ja: "Noto Sans JP"
    fallback: "system-ui, sans-serif"
    weights: [400, 500]
    sizes:
      regular: "0.875rem"     # 14px（本文）
      table: "0.8125rem"      # 13px（テーブルデータ）
      cta: "0.9375rem"        # 15px（CTAボタン）
    line_height: 1.6
    letter_spacing: "0"
  # NOTE: Noto Sans JP は heading + body の全ウェイト [400, 500, 600, 700] をロードする
  mono:
    family: "JetBrains Mono"
    fallback: "ui-monospace, monospace"
    weights: [500, 700]
    sizes:
      counter_large: "1.5rem" # 24px（検索結果件数）
      counter: "1rem"         # 16px（数値一般）
    features: "tabular-nums"
    line_height: 1.4

  # 日本語対応ルール
  japanese:
    base_font: "Noto Sans JP"
    english_overlay: "Outfit"
    note: >
      日本語テキストはNoto Sans JPをベース、英字にOutfitを使用。
      数値表示はJetBrains Monoでtabular-numsを適用し桁揃え。

# ==============================================================================
# 4. スペーシング
# ==============================================================================
spacing:
  unit: "8px"
  scale:
    xs: "4px"       # 0.5 unit
    sm: "8px"       # 1 unit
    md: "16px"      # 2 units
    lg: "24px"      # 3 units
    xl: "32px"      # 4 units
    "2xl": "48px"   # 6 units - セクション間
    "3xl": "64px"   # 8 units - 大セクション間

# ==============================================================================
# 5. ボーダー（角丸・幅）
# ==============================================================================
borders:
  radius:
    none: "0"
    sm: "4px"
    md: "6px"       # ボタン・入力フィールド
    lg: "8px"       # カード・テーブル・ドロップダウン
    xl: "12px"      # モーダル
    full: "9999px"  # フィルタチップ（pill）
    # 要素別マッピング
    elements:
      cta_button: "6px"
      secondary_button: "6px"
      card: "8px"
      table: "8px"
      modal: "12px"
      input: "6px"
      filter_chip: "9999px"
      dropdown: "8px"
  width:
    thin: "1px"     # 標準ボーダー
    medium: "2px"   # フォーカスリング
    thick: "4px"

# ==============================================================================
# 6. シャドウ
# ==============================================================================
# brutally-minimalのためシャドウは最小限。ボーダーで区切りを表現する。
shadows:
  none: "none"
  sm: "0 1px 2px rgba(0, 0, 0, 0.05)"   # カード
  md: "0 4px 6px rgba(0, 0, 0, 0.07)"   # ドロップダウン
  xl: "0 20px 25px rgba(0, 0, 0, 0.1)"  # モーダル
  elements:
    cta_button: "none"
    secondary_button: "none"
    card: "0 1px 2px rgba(0, 0, 0, 0.05)"  # + border: 1px solid border-color
    table: "none"                            # border: 1px solid border-color
    modal: "0 20px 25px rgba(0, 0, 0, 0.1)"
    input: "none"                            # focus: ring-accent
    filter_chip: "none"
    dropdown: "0 4px 6px rgba(0, 0, 0, 0.07)"

# ==============================================================================
# 7. コンポーネント
# ==============================================================================
components:
  library: "shadcn/ui"
  styling: "tailwind"
  animation: "css-transitions"   # C-01解決: motion/react不使用
  icons: "lucide-react"
  chart: "recharts"              # 地域統計のグラフ描画
  map: "react-simple-maps"       # C-03解決: 日本地図ヒートマップ
  table: "tanstack-table"        # TanStack Table v8 - 高機能データテーブル

# ==============================================================================
# 8. アニメーション
# ==============================================================================
animation:
  max_duration: "150ms"
  allowed_properties:
    - "transform"
    - "opacity"
    - "max-height"               # C-02解決: フィルタ展開/折りたたみ用
    - "background-color"         # テーブル行ホバー用
  easing: "ease-out"

  # シーン別定義
  scenes:
    counter_update:
      property: "opacity, transform"
      duration: "150ms"
      easing: "ease-out"
      description: "検索結果件数の数字カウントアップ"
    filter_expand:
      property: "max-height, opacity"   # C-02解決: heightの直接指定は禁止
      duration: "150ms"
      easing: "ease-out"
      description: "フィルタセクションの展開/折りたたみ"
    table_row_hover:
      property: "background-color"
      duration: "100ms"
      easing: "ease-out"
      description: "テーブル行ホバー時の背景色変化"
    download_complete:
      property: "opacity, transform"
      duration: "150ms"
      easing: "ease-out"
      description: "ダウンロード完了チェックマーク表示"
    modal_fade:
      property: "opacity"
      duration: "150ms"
      easing: "ease-out"
      description: "モーダル表示/非表示のフェードイン"

  # 禁止アニメーション
  prohibited:
    - "bounce"
    - "spring"
    - "3秒以上の連続アニメーション"
    - "layout属性（width, height, top, left）の直接アニメーション"
  reduced_motion:
    respect: true
    note: "prefers-reduced-motion: reduce を必ず考慮"

# ==============================================================================
# 9. レスポンシブ
# ==============================================================================
responsive:
  mobile_first: true
  approach: "min-width"
  breakpoints:
    sm: "640px"     # Large phone
    md: "768px"     # Tablet
    lg: "1024px"    # Desktop（主要切替点）
    xl: "1280px"    # Large Desktop
    "2xl": "1536px" # Extra Large

# ==============================================================================
# 10. 品質基準
# ==============================================================================
quality:
  lighthouse:
    performance: 90
    accessibility: 100
    best_practices: 100
    seo: 100
  core_web_vitals:
    fcp: "< 1.5s"
    lcp: "< 2.5s"
    cls: "< 0.1"
  wcag_level: "AA"
  contrast_ratio: "4.5:1"
  touch_target: "44px"
  keyboard: "完全対応"
  screen_reader: "テーブルのaria-label必須"
  focus_ring: "全インタラクティブ要素"
  dark_mode: false             # ライトモード固定（データテーブルの視認性最優先）
  browser_support:
    chrome: "最新2バージョン"
    firefox: "最新2バージョン"
    safari: "最新2バージョン"
    edge: "最新2バージョン"
    ios_safari: "iOS 15+"
    android_chrome: "最新"

# ==============================================================================
# 11. 禁止パターン（Anti-Patterns）
# ==============================================================================
anti_patterns:
  fonts:
    items:
      - "Inter"
      - "Roboto"
      - "Arial"
      - "Space Grotesk"
    reason: "AI Slop回避 - ジェネリックフォント禁止"
  colors:
    items:
      - "紫グラデーション on 白背景"
    reason: "AI生成の典型パターン"
  layout:
    items:
      - "予測可能なレイアウトパターン"
      - "cookie-cutter design"
    reason: "差別化不足"
  effects:
    items:
      - "過剰なドロップシャドウ"
      - "グロー効果"
      - "過度な装飾・イラスト・ヒーローイメージ"
    reason: "brutally-minimalの方針に反する"
