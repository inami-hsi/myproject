# TaskFlow Design System
# Generated by CCAGI SDK Phase 2 - CodeGenAgent (Gen)
# Source: docs/requirements/design-requirements.md

version: "1.0.0"
generated_at: "2026-02-27T00:00:00Z"
source: "docs/requirements/design-requirements.md"

# =============================================================================
# 1. Aesthetic Direction
# =============================================================================
aesthetic:
  direction: calm-functional
  mood: professional
  differentiation: >
    穏やかな色調と十分な余白で「呼吸感」のあるガントチャート。
    従来のガントチャートツールが持つ「情報密度の高さ = 使いにくさ」の問題を排除し、
    タスクの流れを直感的に理解でき、開いた瞬間に「今何をすべきか」が分かるデザイン。
  tagline: "静かで心地よいガントチャート"
  references:
    - name: Linear
      url: https://linear.app
      points: "ミニマルUI、キーボードショートカット中心の操作、余白設計"
    - name: Notion
      url: https://notion.so
      points: "クリーンなタイポグラフィ、柔軟なレイアウト、コンテンツファースト"
    - name: Height
      url: https://height.app
      points: "ガントチャートUI、タスク管理UX、穏やかな色使い"

# =============================================================================
# 2. Colors
# =============================================================================
colors:
  # 2.1 Main Colors
  primary: "#1a1a2e"        # 深いネイビー - ヘッダー・サイドバー
  secondary: "#f8f8f2"      # ソフトホワイト - カード背景
  accent: "#e07a5f"         # テラコッタオレンジ - CTA・ガントバーアクティブ
  accent_2: "#6d8b74"       # セージグリーン - 完了状態・成功
  accent_3: "#8b7ec8"       # ラベンダー - マイルストーン

  # Background
  background:
    light: "#fafaf8"        # 温かいオフホワイト
    dark: "#16161a"         # ダークグレー

  # Text
  text:
    primary: "#2d2d2d"      # メインテキスト
    secondary: "#9ca3af"    # 補助テキスト・プレースホルダー

  # Border
  border: "#e5e5e5"         # 区切り線・枠線

  # Status Colors
  status:
    warning: "#d4a843"      # 期限警告（3日以内）
    danger: "#c44e4e"       # 期限超過・エラー
    success: "#6d8b74"      # 完了・成功（= accent_2）
    info: "#6b9ac4"         # インフォメーション

  # Gantt Chart Colors
  gantt:
    bar:
      not_started: "#d1d5db"  # ミュートグレー
      in_progress: "#e07a5f"  # テラコッタオレンジ（= accent）
      completed: "#6d8b74"    # セージグリーン（= accent_2）
      on_hold: "#9ca3af"      # ミュート
    today_line: "#c44e4e"     # 赤い点線
    dependency_arrow:
      default: "#9ca3af"      # 控えめグレー
      hover: "#e07a5f"        # アクセントでハイライト
    milestone: "#8b7ec8"      # ラベンダー
    critical_path: "#c44e4e"  # 赤系ハイライト

  # Priority Colors
  priority:
    p0_critical: "#c44e4e"  # 赤
    p1_high: "#e07a5f"      # テラコッタ
    p2_medium: "#d4a843"    # アンバー
    p3_low: "#6b9ac4"       # ブルー

  # Dark Mode Overrides
  dark_mode:
    background: "#16161a"
    card_background: "#1e1e24"
    text: "#e4e4e7"
    muted_text: "#71717a"
    border: "#27272a"
    sidebar: "#0f0f14"
    gantt_background: "#1a1a1e"
    weekend_column: "#1e1e22"

# =============================================================================
# 3. Typography
# =============================================================================
typography:
  heading:
    family: "DM Sans"
    fallback: "system-ui, sans-serif"
    weights: [500, 600, 700]
    reason: "幾何学的でありながら温かみがある。Interの代替として個性的"
  body:
    family: "Source Serif 4"
    fallback: "Georgia, serif"
    weights: [400]
    reason: "読みやすいセリフ体。長文の可読性が高い"
  mono:
    family: "JetBrains Mono"
    fallback: "monospace"
    weights: [400]
    reason: "等幅で視認性が高い。進捗率や日付表示に最適"

  scale:
    h1:
      font: "DM Sans"
      weight: 700
      size: "2.5rem"    # 40px
      line_height: 1.2
    h2:
      font: "DM Sans"
      weight: 600
      size: "2rem"      # 32px
      line_height: 1.25
    h3:
      font: "DM Sans"
      weight: 600
      size: "1.5rem"    # 24px
      line_height: 1.3
    h4:
      font: "DM Sans"
      weight: 500
      size: "1.25rem"   # 20px
      line_height: 1.4
    body:
      font: "Source Serif 4"
      weight: 400
      size: "1rem"      # 16px
      line_height: 1.6
    body_large:
      font: "Source Serif 4"
      weight: 400
      size: "1.125rem"  # 18px
      line_height: 1.6
    caption:
      font: "DM Sans"
      weight: 400
      size: "0.875rem"  # 14px
      line_height: 1.4
    code:
      font: "JetBrains Mono"
      weight: 400
      size: "0.875rem"  # 14px
      line_height: 1.5
    gantt_label:
      font: "DM Sans"
      weight: 500
      size: "0.75rem"   # 12px
      line_height: 1.2

  rules:
    - property: text-balance
      target: "見出し（H1-H4）"
      reason: "行末の不自然な改行を防ぐ"
    - property: tabular-nums
      target: "数値表示（進捗率、日付、カウンター）"
      reason: "数字の幅を揃える"
    - property: max-w-prose
      target: "本文テキスト"
      value: "65ch"
      reason: "最適な読みやすさを保つ"

# =============================================================================
# 4. Spacing
# =============================================================================
spacing:
  unit: "8px"
  grid: "8px grid system"
  scale:
    xs: "4px"     # インライン要素間
    sm: "8px"     # 要素内パディング（小）
    md: "16px"    # 要素内パディング（標準）
    lg: "24px"    # セクション間マージン
    xl: "32px"    # セクション間マージン（大）
    2xl: "48px"   # ページセクション間
    3xl: "64px"   # ヒーロー領域

# =============================================================================
# 5. Borders
# =============================================================================
borders:
  radius:
    none: "0"
    sm: "4px"
    md: "6px"        # ガントバー
    lg: "8px"        # ボタン、入力フィールド
    xl: "12px"       # カード
    2xl: "16px"      # モーダル
    full: "9999px"   # アバター、タグ/バッジ
  width:
    thin: "1px"
    medium: "2px"
  element_mapping:
    button: "8px"          # rounded-lg
    card: "12px"           # rounded-xl
    modal: "16px"          # rounded-2xl
    gantt_bar: "6px"       # rounded-md
    input: "8px"           # rounded-lg
    avatar: "9999px"       # rounded-full
    tag: "9999px"          # rounded-full

# =============================================================================
# 6. Shadows
# =============================================================================
shadows:
  sm: "0 1px 2px rgba(0, 0, 0, 0.04)"     # カード、ガントバー
  md: "0 4px 6px rgba(0, 0, 0, 0.07)"     # ホバー状態、ドロップダウン
  lg: "0 10px 15px rgba(0, 0, 0, 0.1)"    # モーダル、ポップオーバー
  # PROHIBITED: shadow-xl, shadow-2xl の常時適用。過剰なシャドウはAI Slop。
  usage:
    card_default: "sm"
    card_hover: "md"
    dropdown: "md"
    modal: "lg"
    popover: "lg"

# =============================================================================
# 7. Components
# =============================================================================
components:
  library: "shadcn/ui"
  styling: "Tailwind CSS 3.4+"
  animation: "motion/react"
  icons: "Lucide React"
  dnd: "dnd-kit"

  principles:
    - "Radix UIプリミティブを使用: アクセシビリティ対応の基盤"
    - "cn() ユーティリティ: clsx + tailwind-merge によるクラス名結合"
    - "Compound Component パターン: 柔軟な構成が可能なAPI設計"
    - "aria-label 必須: 全インタラクティブ要素にアクセシビリティラベル"

  catalog:
    # shadcn/ui ベース
    - name: Button
      base: "shadcn/ui Button"
      customization: "テラコッタアクセント"
    - name: Card
      base: "shadcn/ui Card"
      customization: "温かいオフホワイト背景"
    - name: Input
      base: "shadcn/ui Input"
      customization: "フォーカス時アクセントボーダー"
    - name: Select
      base: "shadcn/ui Select"
      customization: "カスタムドロップダウン"
    - name: Dialog
      base: "shadcn/ui Dialog"
      customization: "rounded-2xl, shadow-lg"
    - name: Calendar
      base: "shadcn/ui Calendar"
      customization: "タスク日付ピッカー"
    - name: Slider
      base: "shadcn/ui Slider"
      customization: "進捗率スライダー"
    - name: Badge
      base: "shadcn/ui Badge"
      customization: "優先度・ステータス表示"
    # カスタムコンポーネント
    - name: GanttChart
      base: "custom"
      customization: "ガントチャート本体"
    - name: GanttBar
      base: "custom"
      customization: "ガントバー（進捗表示付き）"
    - name: GanttTimeline
      base: "custom"
      customization: "タイムラインヘッダー"
    - name: KanbanBoard
      base: "custom"
      customization: "カンバンボード"
    - name: KanbanCard
      base: "custom"
      customization: "カンバンカード"

# =============================================================================
# 8. Responsive
# =============================================================================
responsive:
  mobile_first: true
  breakpoints:
    sm: "640px"     # スマートフォン（横）
    md: "768px"     # タブレット
    lg: "1024px"    # タブレット（横）/ 小型ノートPC
    xl: "1280px"    # デスクトップ
    2xl: "1536px"   # ワイドスクリーン

  layout_strategy:
    mobile:  # < md
      sidebar: "非表示（ハンバーガーメニュー）"
      gantt: "横スクロール"
      kanban: "1カラム縦スクロール"
    tablet:  # md - lg
      sidebar: "折りたたみ可能"
      gantt: "横スクロール"
      kanban: "2カラム"
    desktop:  # lg - xl
      sidebar: "固定表示（240px）"
      gantt: "フル表示"
      kanban: "4カラム"
    wide:  # xl+
      sidebar: "固定表示（280px）"
      gantt: "フル表示 + ミニマップ"
      kanban: "4カラム"

  touch:
    min_target_size: "44px"
    gantt_bar_drag: "タッチ対応（dnd-kit）"
    pinch_zoom: "ガントチャートのタイムスケール変更"
    swipe: "カンバンカラムのスクロール"
    safe_area: "iOS notch/Dynamic Island対応"

# =============================================================================
# 9. Quality
# =============================================================================
quality:
  lighthouse:
    performance: 90
    accessibility: 100
    best_practices: 100
    seo: 100

  core_web_vitals:
    fcp: "< 1.8s"    # First Contentful Paint
    lcp: "< 2.5s"    # Largest Contentful Paint
    cls: "< 0.1"     # Cumulative Layout Shift
    inp: "< 200ms"   # Interaction to Next Paint

  accessibility:
    wcag_level: "AA"
    contrast_ratio:
      normal_text: "4.5:1"
      large_text: "3:1"
    touch_target: "44px"
    keyboard: "全機能対応"
    screen_reader: "aria-label完備"
    focus_indicator: "明確に視認可能"
    color_independence: "アイコン・テキストを併用"

  dark_mode:
    required: true
    toggle: "システム設定連動 + 手動トグル"
    persistence: "localStorage"
    gantt_support: true
    contrast: "ダークモードでもWCAG AA準拠"

# =============================================================================
# 10. Gantt Chart Specific Design
# =============================================================================
gantt:
  bar:
    visual:
      not_started:
        color: "#d1d5db"
        background: "#d1d5db"       # 同色（変化なし）
      in_progress:
        color: "#e07a5f"
        background: "rgba(224, 122, 95, 0.2)"  # 20%不透明度
      completed:
        color: "#6d8b74"
        background: "#6d8b74"       # 全体塗りつぶし
      on_hold:
        color: "#9ca3af"
        background: "斜線パターン"
    radius: "6px"                   # rounded-md
    height:
      desktop: "28px"
      touch: "36px"
    gap: "8px"

  progress_label:
    min_bar_width: "80px"           # 80px以上で表示
    font: "DM Sans"
    weight: 500
    size: "12px"
    color: "バー色に対するコントラスト確保（白またはダークテキスト）"

  dependency_arrow:
    default:
      color: "#9ca3af"
      width: "1px"
      style: "solid"
    hover:
      color: "#e07a5f"
      width: "2px"
      style: "solid"
      transition: "200ms"
    arrow_head:
      shape: "triangle"
      size: "6px"

  today_line:
    color: "#c44e4e"
    style: "dashed"
    dash: "2px"
    gap: "4px"
    label: "今日"
    label_position: "top"

  milestone:
    shape: "diamond"              # 45度回転した正方形
    size: "16px"
    color: "#8b7ec8"
    label_position: "right"

  timescale:
    modes: ["day", "week", "month"]
    transition: "200ms ease-out"
    header: "2段表示（上段: 月/年, 下段: 日/週番号）"
    weekend:
      background_modifier: "わずかに暗い背景色"
      light: "#f5f5f3"
      dark: "#1e1e22"

  drag:
    ghost_opacity: 0.5
    snap: "日単位グリッド"
    resize_cursor: "col-resize"
    feedback: "ドラッグ中に新しい日程をツールチップで表示"

# =============================================================================
# 11. Motion
# =============================================================================
motion:
  principles:
    - "全てのインタラクションアニメーションは200ms以下"
    - "Compositor propsのみ使用: transform, opacity"
    - "レイアウトプロパティ（width, height, top, left）のアニメーション禁止"
    - "prefers-reduced-motionを尊重"

  animations:
    button_hover:
      duration: "150ms"
      easing: "ease-out"
      properties: ["opacity", "transform(scale)"]
    card_expand:
      duration: "200ms"
      easing: "ease-out"
      properties: ["opacity", "transform"]
    modal_show:
      duration: "200ms"
      easing: "ease-out"
      properties: ["opacity", "transform(translateY)"]
    sidebar_toggle:
      duration: "200ms"
      easing: "ease-in-out"
      properties: ["transform(translateX)"]
    gantt_scale_switch:
      duration: "200ms"
      easing: "ease-out"
      properties: ["transform(scaleX)"]
    dropdown:
      duration: "150ms"
      easing: "ease-out"
      properties: ["opacity", "transform(translateY)"]
    toast:
      duration: "200ms"
      easing: "ease-out"
      properties: ["opacity", "transform(translateX)"]
    page_transition:
      duration: "150ms"
      easing: "ease-in-out"
      properties: ["opacity"]

  prohibited:
    - "will-changeの常時適用（必要な時のみ）"
    - "backdrop-filter: blur()の過度な使用（パフォーマンス影響）"
    - "300ms超のアニメーション"
    - "bounce, elastic等の過度なイージング"

# =============================================================================
# 12. Icons
# =============================================================================
icons:
  library: "Lucide React"
  stroke_width: 2                   # カスタマイズ禁止

  sizes:
    inline: "16px"                  # w-4 h-4
    button: "20px"                  # w-5 h-5
    navigation: "24px"              # w-6 h-6
    empty_state: "48px"             # w-12 h-12

  tailwind_classes:
    inline: "w-4 h-4"
    button: "w-5 h-5"
    navigation: "w-6 h-6"
    empty_state: "w-12 h-12"

# =============================================================================
# 13. Dark Mode
# =============================================================================
dark_mode:
  color_mapping:
    background:
      light: "#fafaf8"
      dark: "#16161a"
    card_background:
      light: "#f8f8f2"
      dark: "#1e1e24"
    text:
      light: "#2d2d2d"
      dark: "#e4e4e7"
    muted_text:
      light: "#9ca3af"
      dark: "#71717a"
    border:
      light: "#e5e5e5"
      dark: "#27272a"
    sidebar:
      light: "#1a1a2e"
      dark: "#0f0f14"
    gantt_background:
      light: "#ffffff"
      dark: "#1a1a1e"
    weekend_column:
      light: "#f5f5f3"
      dark: "#1e1e22"

  accent_colors: "ライト/ダーク共通。ダークモードでコントラスト比が不足する場合は明度を10%上げる"

# =============================================================================
# 14. Anti-Patterns (PROHIBITED)
# =============================================================================
anti_patterns:
  fonts:
    prohibited:
      - "Inter"
      - "Roboto"
      - "Arial"
      - "Space Grotesk"
    reason: "AIが最も多く選択するフォント。個性がない"

  colors:
    prohibited:
      - "紫グラデーション on 白背景"
    reason: "AI生成UIの典型配色"

  layout:
    prohibited:
      - "予測可能なレイアウトパターン（Hero + 3カラムグリッド等の定型パターン）"
    reason: "テンプレート感のある没個性デザイン"

  effects:
    prohibited:
      - "過剰なドロップシャドウ（カード全てにshadow-xlを適用する等）"
      - "グロー効果（ネオンのような発光効果）"
      - "Cookie-cutter design（テンプレート感のある没個性デザイン）"
    reason: "AI生成の典型パターン"

  shadows:
    prohibited:
      - "shadow-xl"
      - "shadow-2xl"
    reason: "過剰なシャドウはAI Slop"

  motion:
    prohibited:
      - "will-changeの常時適用"
      - "backdrop-filter: blur()の過度な使用"
      - "300ms超のアニメーション"
      - "bounce, elastic等の過度なイージング"
    reason: "パフォーマンス影響・過剰な演出"
